<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VATROC | 中華民國虛擬航管組織</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); font-family: 'Inter', sans-serif; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        
        .metar-row { display: flex; align-items: center; gap: 1rem; background: rgba(0,0,0,0.2); padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .metar-icao { color: #60a5fa; font-weight: 800; font-family: monospace; width: 60px; flex-shrink: 0; }
        .metar-content { 
            color: #34d399; font-family: 'Courier New', monospace; font-size: 0.9rem; 
            white-space: nowrap; overflow-x: auto; flex-grow: 1; 
        }
        .metar-content::-webkit-scrollbar { height: 2px; }
        .metar-content::-webkit-scrollbar-thumb { background: rgba(52, 211, 153, 0.3); }

        .status-online::before { content: ""; position: absolute; left: -12px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0.4); } 100% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center mb-8 max-w-6xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xl text-white shadow-lg shadow-blue-500/20">RC</div>
            <h1 class="text-2xl font-bold tracking-tight text-white">VATROC <span class="text-blue-400 text-xs font-normal border border-blue-400/30 px-1 rounded ml-1">v3.0</span></h1>
        </div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-slate-400">
            <a href="index.html" class="text-white underline decoration-blue-500 underline-offset-8 decoration-2">首頁 / 即時航情</a>
            <a href="staff.html" class="hover:text-white transition-colors">管制員專區</a>
            <a href="#" class="hover:text-white transition-colors">飛行員資源</a>
        </div>
        <button class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full text-sm font-semibold transition-all">VATSIM 登入</button>
    </nav>

    <main class="max-w-6xl mx-auto space-y-6">
        
        <section class="glass-card p-6 border-l-4 border-emerald-500">
            <h3 class="font-bold mb-4 flex items-center gap-2 text-emerald-400 text-sm tracking-widest uppercase">
                <span class="w-2 h-2 bg-emerald-500 rounded-full pulse"></span>
                Real-time METAR (桃園國際機場)
            </h3>
            <div class="space-y-3">
                <div class="metar-row">
                    <span class="metar-icao">RCTP</span>
                    <div id="metar-RCTP" class="metar-content italic text-slate-500">正在連線至氣象伺服器...</div>
                </div>
                <div class="metar-row">
                    <span class="metar-icao">RCSS</span>
                    <div id="metar-RCSS" class="metar-content italic text-slate-500">等待資料同步...</div>
                </div>
                <div class="metar-row">
                    <span class="metar-icao">RCKH</span>
                    <div id="metar-RCKH" class="metar-content italic text-slate-500">等待資料同步...</div>
                </div>
            </div>
        </section>

        <section class="glass-card p-4">
            <div class="rounded-xl overflow-hidden border border-slate-700/50">
                <iframe src="https://map.vatsim.net/" width="100%" height="550" style="border:0;"></iframe>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <section class="glass-card p-6">
                    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                        <h2 class="text-lg font-semibold relative ml-4 status-online text-white">RCTP 線上管制席位</h2>
                        <span id="update-tag" class="text-[10px] text-slate-500 font-mono tracking-tighter uppercase">Initializing...</span>
                    </div>
                    <div class="flex gap-4 mb-6">
                        <div class="bg-slate-800/40 px-4 py-2 rounded-lg border border-slate-700">
                            <span class="text-xs text-slate-400 block">桃園在線席位</span>
                            <span id="atc-count" class="text-xl font-bold text-blue-400">0</span>
                        </div>
                        <div class="bg-slate-800/40 px-4 py-2 rounded-lg border border-slate-700">
                            <span class="text-xs text-slate-400 block">全台在線飛機</span>
                            <span id="pilot-count" class="text-xl font-bold text-emerald-400">0</span>
                        </div>
                    </div>
                    <div id="atc-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <p class="text-slate-500">載入中...</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://data.vatsim.net/v3/vatsim-data.json';
        // 修正 METAR API: 官方建議使用 vatsim 自己的 METAR 介面或航空氣象局，這裡使用 vatsim 較穩定
        const METAR_API = "https://metar.vatsim.net/metar.php?id=";

        async function updateData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // 【核心修改】：這裡改為只抓 RCTP 開頭的呼號
                const controllers = data.controllers.filter(c => c.callsign.startsWith('RCTP' , 'RCSS' , 'RCKH' , 'TPE'));
                
                const container = document.getElementById('atc-container');
                container.innerHTML = controllers.length ? '' : '<p class="text-slate-500 col-span-2 text-center py-4">目前桃園機場無席位在線</p>';
                
                controllers.forEach(atc => {
                    container.innerHTML += `
                        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 hover:border-blue-500/50 transition-all">
                            <div class="flex justify-between font-bold text-blue-400">
                                <span>${atc.callsign}</span>
                                <span>${atc.frequency}</span>
                            </div>
                            <div class="text-sm text-slate-300 mt-1">${atc.name}</div>
                        </div>`;
                });

                // 更新計數
                document.getElementById('atc-count').innerText = controllers.length;
                document.getElementById('pilot-count').innerText = data.pilots.filter(p => p.callsign.startsWith('RC') || (p.latitude > 21 && p.latitude < 26)).length;
                document.getElementById('update-tag').innerText = `最後更新: ${new Date().toLocaleTimeString()}`;
            } catch (e) { 
                console.error(e); 
                document.getElementById('update-tag').innerText = "連線失敗";
            }
        }

        async function updateMetar(icao) {
            try {
                const res = await fetch(`${METAR_API}${icao}`);
                const text = await res.text();
                const el = document.getElementById(`metar-${icao}`);
                if (el) {
                    el.innerText = text.trim() || "無資料";
                    el.classList.remove('text-slate-500', 'italic');
                }
            } catch (e) { 
                const el = document.getElementById(`metar-${icao}`);
                if (el) el.innerText = "讀取失敗"; 
            }
        }

        // 初始執行
        updateData(); 
        const airports = ['RCTP', 'RCSS', 'RCKH'];
        airports.forEach(updateMetar);

        // 定時更新
        setInterval(updateData, 30000); // 30秒更新一次 ATC
        setInterval(() => { 
            airports.forEach(updateMetar);
        }, 300000); // 5分鐘更新一次氣象
    </script>
</body>
</html>
