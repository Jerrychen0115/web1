<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VATROC | ATC Application Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            background-image: url('TP.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif; 
            color: #f8fafc; 
            min-height: 100vh; 
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.6); 
            z-index: -1;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
        }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #93c5fd;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <main class="max-w-2xl mx-auto py-12">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-black text-white mb-2">ATC APPLICATION</h1>
            <p class="text-slate-400">成為台北飛航情報區的一份子</p>
        </div>

        <form 
            action="https://docs.google.com/forms/d/e/1FAIpQLSeVwDpBDDgmc6QnRDLwD-Zzod9gq5Qrghiql8ee3r6V52P80A/formResponse" 
            method="POST" 
            class="glass-card p-8 space-y-6">
            
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label>VATSIM ID</label>
                    <input type="text" name="entry.2098958242" required placeholder="e.g. 1000001" class="w-full px-4 py-3 rounded-xl">
                </div>

                <div>
                    <label>English Name</label>
                    <input type="text" name="entry.116189681" required placeholder="e.g. Wang Xiao-Ming" class="w-full px-4 py-3 rounded-xl">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label>Birth Year</label>
                    <input type="number" name="entry.1675845772" required placeholder="e.g. 2000" class="w-full px-4 py-3 rounded-xl">
                </div>

                <div>
                    <label>Education Status</label>
                    <select name="entry.2142229340" required class="w-full px-4 py-3 rounded-xl appearance-none bg-slate-900">
                        <option value="" disabled selected>Select status</option>
                        <option value="Student">Student (學生)</option>
                        <option value="Employed">Employed (在職)</option>
                        <option value="Other">Other (其他)</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Flightsim Experience</label>
                <textarea name="entry.980750356" rows="3" required placeholder="Your flight sim experience" class="w-full px-4 py-3 rounded-xl"></textarea>
            </div>

            <div>
                <label>Anything else you want to let us know?</label>
                <textarea name="entry.1210745125" rows="3" placeholder="（Choose）" class="w-full px-4 py-3 rounded-xl"></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold transition-all transform hover:scale-[1.02] shadow-xl">
                    提交申請表單 SUBMIT
                </button>
            </div>

            <div class="text-center">
                <a href="joinatc.html" class="text-slate-500 text-sm hover:text-white transition-colors">← Return</a>
            </div>
        </form>
    </main>

</body>
</html>
