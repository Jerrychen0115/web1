<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VATROC | 中華民國虛擬航管組織</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            /* 【修正】確認你的圖片檔名與你上傳到 GitHub 的一致 */
            background-image: url('TP.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif; 
            color: #f8fafc; 
            min-height: 100vh; 
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.4); /* 背景遮罩，讓圖片更亮 */
            z-index: -1;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.3); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; 
        }
        
        .text-shadow-sm {
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .metar-row { display: flex; align-items: center; gap: 1rem; background: rgba(0,0,0,0.4); padding: 0.75rem 1rem; border-radius: 8px; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        th { background: rgba(0, 0, 0, 0.3); }

        /* 新增：LOGO 樣式 */
        .vatroc-logo {
            height: 90px; /* 調整 LOGO 高度 */
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center mb-10 max-w-7xl mx-auto relative z-10">
        <div class="flex items-center gap-3">
            <img src="VATROC.png" alt="VATROC Logo" class="vatroc-logo">
        </div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-white text-shadow-sm items-center">
            <a href="index.html" class="underline decoration-blue-500 underline-offset-8 decoration-2">Main Page</a>
            <a href="staff.html" class="hover:text-blue-300 transition-colors">ATC center</a>
            <a href="https://ais.caa.gov.tw/eaip/" target="_blank" class="hover:text-blue-300">Pilot resources</a>
            <a href="joinatc.html" class="hover:text-blue-300 transition-colors">ATC training / Visiting</a>
            
        </div>
        
    </nav>

    <main class="max-w-7xl mx-auto space-y-6 relative z-10">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white text-shadow-sm">Welcome to VATROC control center</h1>
                <p id="update-tag" class="text-xs text-blue-200 font-mono tracking-widest mt-1 text-shadow-sm">FETCHING VATSIM DATA...</p>
            </div>
            <div class="flex gap-4">
                <div class="glass-card px-6 py-3 text-center min-w-[100px]">
                    <span class="text-[10px] text-slate-300 block uppercase font-bold">Controllers</span>
                    <span id="atc-count" class="text-2xl font-bold text-blue-400 font-mono">0</span>
                </div>
                <div class="glass-card px-6 py-3 text-center min-w-[100px] border-t-4 border-t-orange-500">
                    <span class="text-[10px] text-slate-300 block uppercase font-bold text-orange-400">Departures</span>
                    <span id="dep-count" class="text-2xl font-bold text-white font-mono">0</span>
                </div>
                <div class="glass-card px-6 py-3 text-center min-w-[100px] border-t-4 border-t-emerald-500">
                    <span class="text-[10px] text-slate-300 block uppercase font-bold text-emerald-400">Arrivals</span>
                    <span id="arr-count" class="text-2xl font-bold text-white font-mono">0</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="glass-card p-6">
                <h3 class="text-xs font-bold text-blue-300 uppercase tracking-widest mb-4">Online ATC</h3>
                <div id="atc-container" class="space-y-3">
                    </div>
            </section>

            <section class="lg:col-span-2 glass-card p-6">
                <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4">Airport METAR</h3>
                <div id="metar-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </section>
        </div>

        <section class="glass-card overflow-hidden">
            <div class="p-4 border-b border-white/10 bg-black/20">
                <h3 class="text-xs font-bold text-slate-200 uppercase tracking-widest">RCTP Flight Board</h3>
            </div>
            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-left table-fixed border-collapse">
                    <thead class="text-[11px] text-slate-300 uppercase font-bold">
                        <tr>
                            <th class="p-4 w-[20%]">Callsign</th>
                            <th class="p-4 w-[20%] text-center">Aircraft</th>
                            <th class="p-4 w-[30%] text-center">Route</th>
                            <th class="p-4 w-[15%] text-left">Alt / GS</th>
                            <th class="p-4 w-[15%] text-right">ETA (Z)</th>
                    
                    </thead>
                    <tbody id="flight-table-body" class="divide-y divide-white/5 font-medium">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'https://data.vatsim.net/v3/vatsim-data.json';
        const METAR_API = 'https://metar.vatsim.net/metar.php?id=';
        const AIRPORTS = ['RCTP', 'RCSS', 'RCKH', 'RCMQ'];
        const ATC_PREFIXES = ['RCTP', 'RCSS', 'RCKH', 'TPE_'];

        async function updateData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                const controllers = data.controllers.filter(c => ATC_PREFIXES.some(p => c.callsign.startsWith(p)));
                document.getElementById('atc-container').innerHTML = controllers.map(atc => `
                    <div class="bg-black/40 p-3 rounded-lg border border-white/5 flex justify-between">
                        <span class="font-mono text-blue-400 font-bold">${atc.callsign}</span>
                        <span class="font-mono text-white">${atc.frequency}</span>
                    </div>
                `).join('') || '<p class="text-slate-500 text-sm">無管制員在線</p>';
                document.getElementById('atc-count').innerText = controllers.length;

                let dep = 0, arr = 0;
                let rctpPilots = data.pilots.filter(p => {
                    if(!p.flight_plan) return false;
                    if(p.flight_plan.departure === 'RCTP') { dep++; return true; }
                    if(p.flight_plan.arrival === 'RCTP') { arr++; return true; }
                    return false;
                });

                document.getElementById('dep-count').innerText = dep;
                document.getElementById('arr-count').innerText = arr;

                document.getElementById('flight-table-body').innerHTML = rctpPilots.map(p => {
                    let eta = "--:--";
                    if(p.flight_plan.deptime && p.flight_plan.enroute_time){
                        let h = (parseInt(p.flight_plan.deptime.slice(0,2)) + parseInt(p.flight_plan.enroute_time.slice(0,2))) % 24;
                        let m = (parseInt(p.flight_plan.deptime.slice(2,4)) + parseInt(p.flight_plan.enroute_time.slice(2,4))) % 60;
                        eta = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                    }
                    return `
                        <tr class="hover:bg-white/5 transition-colors text-sm">
                            <td class="p-4 font-bold text-blue-400">${p.callsign}</td>
                            <td class="p-4 text-center text-slate-300">${p.flight_plan.aircraft_short}</td>
                            <td class="p-4 text-center font-mono text-xs whitespace-nowrap">
                                <span class="text-orange-400">${p.flight_plan.departure}</span> → <span class="text-emerald-400">${p.flight_plan.arrival}</span>
                            </td>
                            <td class="p-4 font-mono text-xs text-slate-300 pl-4 whitespace-nowrap">${p.altitude} / ${p.groundspeed}</td>
                            <td class="p-4 text-right font-mono text-blue-300">${eta}</td>
                        </tr>
                    `;
                }).join('');

                document.getElementById('update-tag').innerText = `LAST UPDATE: ${new Date().toLocaleTimeString()}`;
            } catch(e) { console.log(e); }
        }

        async function updateMetars() {
            const list = document.getElementById('metar-list');
            list.innerHTML = AIRPORTS.map(icao => `
                <div class="bg-black/40 p-3 rounded-lg">
                    <div class="text-blue-400 font-bold text-xs mb-1">${icao}</div>
                    <div id="metar-${icao}" class="text-[10px] font-mono text-emerald-400 leading-tight italic">Loading...</div>
                </div>
            `).join('');
            for(const icao of AIRPORTS){
                try {
                    const res = await fetch(METAR_API + icao);
                    const text = await res.text();
                    document.getElementById('metar-' + icao).innerText = text.trim() || 'N/A';
                } catch (e) { document.getElementById('metar-' + icao).innerText = 'ERROR'; }
            }
        }

        updateData(); updateMetars();
        setInterval(updateData, 30000);
        setInterval(updateMetars, 300000);
    </script>
</body>
</html>
